<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Rush - Puzzle Tournament</title>
    
    <!-- Firebase Core, Auth and Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0e15;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; text-align: center; width: 100%; }
        .auth-card { background: #161925; padding: 30px 20px; border-radius: 20px; border: 1px solid #3f37c9; box-shadow: 0 0 25px rgba(63, 55, 201, 0.3); max-width: 400px; width: 100%; }
        .input-field { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #3f37c9; background: #0d0e15; color: #fff; font-size: 16px; outline: none; }
        .input-field:focus { border-color: #00f2fe; }
        .auth-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        #game-screen { display: none; width: 100%; max-width: 500px; }
        .header-stats { background: #161925; padding: 15px; border-radius: 15px; border: 1px solid #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .coin-box { font-size: 20px; font-weight: bold; color: #ffd700; display: flex; align-items: center; gap: 5px; }
        .coin-icon { width: 24px; height: 24px; background: #ffd700; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #ffd700; }
        .pool-box { font-size: 14px; color: #a0a5c1; }
        .game-container { background: #161925; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #3f37c9; margin-bottom: 20px; position: relative; }
        .puzzle-title { font-size: 18px; color: #00f2fe; margin-bottom: 5px; }
        .puzzle-text { font-size: 22px; font-weight: bold; margin: 20px 0; min-height: 60px; }
        .answer-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #3f37c9; background: #0d0e15; color: #fff; font-size: 18px; text-align: center; outline: none; margin-bottom: 15px; }
        .answer-input:focus { border-color: #00f2fe; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #3f37c9, #00f2fe); border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #222533; color: #fff; border: 1px solid #3f37c9; }
        .custom-popup { display: none; position: fixed; top: 20px; background: #10b981; color: white; padding: 15px 30px; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); z-index: 100; text-align: center; max-width: 90%; }
        .custom-popup.wrong { background: #ef4444; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .leaderboard-box { background: #111420; border-radius: 15px; padding: 15px; border: 1px solid #222533; }
        .leaderboard-title { font-size: 16px; color: #ff007f; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .player-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #1c1f30; font-size: 14px; }
        .player-row.top-player { color: #ffd700; font-weight: bold; }
        .player-row.me { background: rgba(0, 242, 254, 0.15); border-radius: 5px; border-left: 3px solid #00f2fe; }
        .lock-screen { display: none; position: absolute; background: rgba(13, 14, 21, 0.98); top: 0; left: 0; width: 100%; height: 100%; z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="popup-notification" class="custom-popup">Notification</div>

    <!-- AUTH SCREEN (USERNAME & PASSWORD) -->
    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: #00f2fe; margin-bottom: 5px;">Brain Rush 🧠</h1>
            <p style="color: #a0a5c1; font-size: 14px; margin-bottom: 20px;">Apna account banao aur khelna shuru karo!</p>
            
            <input type="text" id="auth-username" class="input-field" placeholder="Apna Naam (e.g. Rahul)">
            <input type="email" id="auth-email" class="input-field" placeholder="Koshish karein Email daalein">
            <input type="password" id="auth-password" class="input-field" placeholder="Koi bhi 6-digit Password">
            
            <div class="auth-btn-group">
                <button class="btn" onclick="handleSignUp()">Sign Up</button>
                <button class="btn btn-secondary" onclick="handleLogin()">Login</button>
            </div>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="game-screen">
        <div class="header-stats">
            <div class="pool-box">Room Pool: <span id="pool-id">Group_No_1</span></div>
            <div class="coin-box"><span class="coin-icon"></span> <span id="my-coins">0</span></div>
        </div>

        <div class="game-container">
            <div class="puzzle-title">Puzzle #<span id="puzzle-number">1</span>/10</div>
            <div class="puzzle-text" id="puzzle-question">Loading...</div>
            
            <input type="text" id="user-answer" class="answer-input" placeholder="Apna jawab likho...">
            <button class="btn" onclick="checkAnswer()">Submit Answer</button>

            <!-- Lock Screen for Ads -->
            <div class="lock-screen" id="ad-lock-screen">
                <h2 style="color: #ff007f;">🔒 10 Puzzles Completed!</h2>
                <p style="margin: 15px 0; color: #a0a5c1;">Agle 10 puzzles unlock karne ke liye ek ad dekhein.</p>
                <button class="btn" style="background: linear-gradient(45deg, #ff007f, #ff758c);" onclick="watchAdToUnlock()">Watch Ad to Continue</button>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard-box">
            <div class="leaderboard-title">
                <span>🏆 Pool Leaderboard (Top 5 Wins)</span>
                <span style="color: #a0a5c1; font-size:12px;">Resets in: 2 Days</span>
            </div>
            <div id="leaderboard-list"></div>
        </div>
        <center><button class="btn btn-secondary" style="margin-top:20px; width:auto; padding:8px 20px; font-size:14px;" onclick="auth.signOut()">Logout</button></center>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB67TrXlrvp69dWmiMThTRqnAq41ernlG8",
            authDomain: "puzzle-game-390ed.firebaseapp.com",
            databaseURL: "https://puzzle-game-390ed-default-rtdb.firebaseio.com/",
            projectId: "puzzle-game-390ed",
            storageBucket: "puzzle-game-390ed.firebasestorage.app",
            messagingSenderId: "90369555191",
            appId: "1:90369555191:web:959bc1c255fc036623f1f2",
            measurementId: "G-N7TCV8MKZH"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        const puzzles = [
            { q: "Mummy ka ulta kya hota hai? (Hint: Papa nahi)", a: "ymmum" },
            { q: "Wo kya hai jo upar jata hai par niche kabhi nahi aata?", a: "umar" },
            { q: "10 + 20 * 0 + 5 = ?", a: "15" },
            { q: "Aisa kaun sa phal hai jise hum khareed nahi sakte?", a: "mehnat ka phal" }
        ];

        let currentUser = null;
        let currentPuzzleIndex = 0;
        let myCoins = 0;
        let solvedCount = 0;
        let globalUsername = "";

        // Sign Up Function
        function handleSignUp() {
            let name = document.getElementById('auth-username').value.trim();
            let email = document.getElementById('auth-email').value.trim();
            let password = document.getElementById('auth-password').value.trim();

            if(!name || !email || !password) { showNotification("Saari fields bharo bhai!", true); return; }
            if(password.length < 6) { showNotification("Password kam se kam 6 digit ka rakho.", true); return; }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    let user = userCredential.user;
                    rtdb.ref("users/" + user.uid).set({
                        uid: user.uid,
                        name: name,
                        coins: 0,
                        currentPuzzle: 0,
                        solvedCount: 0
                    });
                    showNotification("Registration Successful! 🎉", false);
                })
                .catch(err => showNotification(err.message, true));
        }

        // Login Function
        function handleLogin() {
            let email = document.getElementById('auth-email').value.trim();
            let password = document.getElementById('auth-password').value.trim();

            if(!email || !password) { showNotification("Email aur Password daalo!", true); return; }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => { showNotification("Welcome Back! 🕹️", false); })
                .catch(err => showNotification("Login Failed: Galat details.", true));
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                loadUserData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('game-screen').style.display = 'none';
            }
        });

        function loadUserData() {
            rtdb.ref("users/" + currentUser.uid).once("value", (snapshot) => {
                if (snapshot.exists()) {
                    let data = snapshot.val();
                    myCoins = data.coins || 0;
                    currentPuzzleIndex = data.currentPuzzle || 0;
                    solvedCount = data.solvedCount || 0;
                    globalUsername = data.name || "Player";
                }
                document.getElementById('my-coins').innerText = myCoins;
                loadPuzzle();
                listenToLeaderboard();
            });
        }

        function loadPuzzle() {
            if (solvedCount >= 10) {
                document.getElementById('ad-lock-screen').style.display = 'flex';
                return;
            }
            let p = puzzles[currentPuzzleIndex % puzzles.length];
            document.getElementById('puzzle-question').innerText = p.q;
            document.getElementById('puzzle-number').innerText = (solvedCount % 10) + 1;
            document.getElementById('user-answer').value = "";
        }

        function checkAnswer() {
            let input = document.getElementById('user-answer').value.trim().toLowerCase();
            let p = puzzles[currentPuzzleIndex % puzzles.length];

            if (input === p.a) {
                myCoins += 3;
                solvedCount++;
                currentPuzzleIndex++;
                
                document.getElementById('my-coins').innerText = myCoins;
                showNotification("Sahi Jawab! +3 Coins 🎉", false);

                rtdb.ref("users/" + currentUser.uid).update({
                    coins: myCoins,
                    currentPuzzle: currentPuzzleIndex,
                    solvedCount: solvedCount
                });

                loadPuzzle();
            } else {
                showNotification("Galat Jawab! Dobara koshish karo.", true);
            }
        }

        function watchAdToUnlock() {
            showNotification("Ad chal raha hai...", false);
            setTimeout(() => {
                solvedCount = 0;
                rtdb.ref("users/" + currentUser.uid).update({ solvedCount: 0 });
                document.getElementById('ad-lock-screen').style.display = 'none';
                showNotification("Game Unlocked!", false);
                loadPuzzle();
            }, 3000);
        }

        function listenToLeaderboard() {
            rtdb.ref("users").orderByChild("coins").limitToLast(5).on("value", (snapshot) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                let players = [];
                
                snapshot.forEach((child) => { players.push(child.val()); });
                players.reverse();

                players.forEach((data, index) => {
                    let rank = index + 1;
                    let rowClass = "player-row";
                    let prefix = "";

                    if (rank <= 3) rowClass += " top-player";
                    if (rank === 1) prefix = "👑 ";
                    if (data.uid === currentUser.uid) rowClass += " me";

                    list.innerHTML += `
                        <div class="${rowClass}">
                            <span>${prefix}${rank}. ${data.name || 'Anonymous'}</span>
                            <span>${data.coins} Coins</span>
                        </div>
                    `;
                });
            });
        }

        function showNotification(msg, isWrong) {
            const popup = document.getElementById('popup-notification');
            popup.innerText = msg;
            popup.style.display = 'block';
            if (isWrong) popup.classList.add('wrong'); else popup.classList.remove('wrong');
            setTimeout(() => { popup.style.display = 'none'; }, 2500);
        }
    </script>
</body>
    </html>
