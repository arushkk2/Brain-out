<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Out Trivia</title>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #121420; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #1a1d2e; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-box { background: #252942; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .hearts-box { color: #ef4444; font-size: 20px; letter-spacing: 2px; }
        .game-card { background: #161925; border-radius: 20px; padding: 30px 20px; margin-bottom: 20px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); min-height: 180px; display: flex; align-items: center; justify-content: center; }
        .puzzle-text { font-size: 20px; font-weight: bold; margin: 0; line-height: 1.5; color: #f3f4f6; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .option-btn { width: 100%; padding: 14px; background: #1f233a; border: 2px solid #2d3250; color: #fff; font-size: 16px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .option-btn:active { transform: scale(0.97); background: #2d3250; }
        .sub-section { background: #161925; border-radius: 20px; padding: 15px; margin-top: 15px; }
        .back-dashboard-btn { background: none; border: 1px solid #3a3f58; color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .custom-popup { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 25px; border-radius: 30px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideDown 0.3s ease; }
        .player-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #252942; font-size: 14px; }
        .top-player { border-left: 4px solid #ffd700; background: rgba(255,215,0,0.05); }
        .me { border: 1px solid #00f2fe; background: rgba(0,242,254,0.05); font-weight: bold; }
        #block-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(18,20,32,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>

<!-- AD CONTAINER FOR HINT -->
<div id="hint-ad-container" style="display: none; text-align: center; margin: 15px 0; padding: 10px; background: #2a2d3d; border-radius: 8px;">
  <p style="color: #fff; margin: 0 0 10px 0; font-size: 14px;">💡 Ad Loading...</p>
  <div id="adsterra-banner-slot"></div>
</div>

<div id="popup-notification" class="custom-popup">Notification</div>

<div id="block-screen">
    <h1 style="font-size:50px; margin-bottom:10px;">🔒</h1>
    <h2>Daily Limit Reached!</h2>
    <p style="color:#aaa; margin: 10px 0 20px 0; max-width:300px;">Aapne aaj ke maximum levels paar kar liye hain.</p>
    <button id="timer-btn" class="menu-btn btn-play" style="width:100%; background:#3b82f6; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold;" disabled>00:00:00</button>
</div>                  
    <!-- AUTH SCREEN -->
<div id="auth-screen" class="container">
    <div class="auth-card">
        <h2 style="margin-bottom: 5px;">🧠 Brain Out Trivia</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 25px;">Sawal Mazedar, Dimag Behtareen!</p>
        <input type="text" id="auth-username" class="option-btn" style="background:#161925; text-align:left; margin-bottom:20px; cursor:text;" placeholder="Apna Naam Likhein">
        <button class="option-btn" style="background:#22c55e; border-color:#16a34a;" onclick="handleSimpleLogin()">GAME SHURU KAREIN 🚀</button>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboard-screen" class="container" style="display:none;">
    <div class="header-row">
        <div style="text-align: left;">
            <div id="user-welcome" style="font-weight:bold; font-size:18px; color:#ffd700;">Player</div>
        </div>
        <button class="back-dashboard-btn" style="margin:0; padding:6px 12px; border-color:#ef4444; color:#ef4444;" onclick="logout()">Log Out</button>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;">
        <div class="stats-box" style="justify-content:center; background:#1e2235; padding:20px;"><span style="font-size:24px;">🪙</span> <span id="dash-coins" style="font-size:20px;">0</span></div>
        <div class="stats-box" style="justify-content:center; background:#1e2235; padding:20px;"><span style="font-size:24px;">🎯</span> <span id="dash-level" style="font-size:20px;">Level 1</span></div>
    </div>
    <button class="option-btn" style="background:#22c55e; border-color:#16a34a; font-size:20px; padding:18px; margin-bottom:15px;" onclick="startGame()">▶ PLAY GAME</button>
    <button class="option-btn" style="background:#3b82f6; border-color:#2563eb; margin-bottom:15px;" onclick="showScreen('leaderboard-screen')">🏆 LEADERBOARD</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="container" style="display:none;">
    <div class="header-row">
        <div class="stats-box">🪙 <span id="coin-count">0</span></div>
        <div id="level-indicator" class="stats-box" style="background:#ffd700; color:#121420;">Level 1</div>
        <div class="hearts-box" id="hearts-container">❤️❤️❤️</div>
    </div>
    <div class="game-card"><p class="puzzle-text" id="puzzle-question">Question loading...</p></div>
    <div class="options-grid" id="options-container"></div>
    <div style="display:grid; grid-template-columns:1fr; gap:10px;">
        <button class="option-btn" style="background:#3a3f58; border-color:#4a4f6e;" onclick="triggerHint()">💡 Hint (Ad)</button>
    </div>
    <button class="back-dashboard-btn" onclick="showScreen('dashboard-screen')">⬅ Back to Dashboard</button>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboard-screen" class="container" style="display:none;">
    <h2 style="color:#ffd700; margin-bottom:20px;">🏆 Top Players</h2>
    <div id="leaderboard-list" class="sub-section" style="text-align:left; padding:10px; max-height:350px; overflow-y:auto;"></div>
    <button class="back-dashboard-btn" style="width:100%; padding:12px;" onclick="showScreen('dashboard-screen')">⬅ Back to Dashboard</button>
</div>

<script>
// Firebase Config WITHOUT Auth Dependency
const firebaseConfig = {
    databaseURL: "https://brain-out-game-xyz-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

let currentUsername = localStorage.getItem('game_user') || null;
let currentPuzzleIndex = 0;
let myCoins = 0;
let myHearts = 3;
let solvedCount = 0;
    const puzzles = [
    { q: "Ek room me 4 log hain, unme se har ek ke paas 1-1 billi hai. Room me kul kitne pair hain?", o: ["8 pair", "16 pair", "24 pair", "10 pair"], c: 2, h: "Insaano ke 2 pair aur billiyon ke 4 pair hote hain. Kul: (4x2) + (4x4) = 24 pair!" },
    { q: "Aisa kaun sa phal hai jise hum khareed nahi sakte?", o: ["Kismat ka phal", "Mehnat ka phal", "Sabar ka phal", "Bazar ka phal"], c: 1, h: "Kehte hain na—'Mehnat ka phal meetha hota hai'!" },
    { q: "Wo kya hai jo upar toh jata hai par neeche kabhi nahi aata?", o: ["Patang", "Umar (Age)", "Gubbara", "Dhuan"], c: 1, h: "Har saal aapka janamdin aata hai aur ye badh jaati hai." },
    { q: "Aisi kaun si cheez hai jo tootne par hi kaam aati hai?", o: ["Sheesha", "Khilona", "Anda (Egg)", "Dil"], c: 2, h: "Omlet banane ke liye iska tootna zaroori hai!" },
    { q: "Wo kya hai jise aap jitna saaf karoge, wo utna hi kala hota jayega?", o: ["Blackboard", "Kapda", "Haath", "Joote"], c: 0, h: "School me teacher ispar chalk se likhte hain." },
    { q: "Ek kuyein me 10 meandhak thhe, 2 mar gaye. Ab kuyein me kitne meandhak hain?", o: ["8", "10", "2", "0"], c: 1, h: "Mare hue meandhak bhi kuyein ke andar hi rahenge!" },
    { q: "Wo kaun si cheez hai jo paani peete hi mar jaati hai?", o: ["Pyaas", "Aag", "Pyaas aur Aag dono", "Hawa"], c: 2, h: "Pyaas bujh jaati hai aur aag bujh jaati hai." },
    { q: "Aisa kaun sa kuan hai jo pyase ke paas jata hai?", o: ["Paani ka kuan", "Chalk ka kuan", "Mobile phone", "Pyaas ka kuan"], c: 2, h: "Aajkal log phone lekar har jagah ghoomte hain." },
    { q: "Ek haathi paani me gir gaya, ab wo kaise niklega?", o: ["Bheeg kar", "Khush hokar", "Marr kar", "Tair kar"], c: 0, h: "Paani me girne par har cheez gili (bheeg) ho jaati hai." },
    { q: "Wo kya hai jise hum dekh sakte hain par chhoo nahi sakte?", o: ["Sapna", "Hawa", "Aasman", "Sapna aur Aasman dono"], c: 3, h: "Raat ko sote waqt jo dikhta hai aur jo upar neela neela hai." },
    ...Array.from({length: 90}, (_, i) => {
        const id = i + 11;
        return {
            q: `Level ${id}: Dimag lagao! Agar 1=5, 2=25, 3=125, 4=625 toh 5=?`,
            o: ["3125", "1", "5", "25"],
            c: 1,
            h: "Sawal ki pehli line ko dhyan se padho, jawab wahan chhupa hai."
        };
    })
];
    function showScreen(screenId) {
    ['auth-screen', 'dashboard-screen', 'game-screen', 'leaderboard-screen'].forEach(id => {
        document.getElementById(id).style.display = (id === screenId) ? 'block' : 'none';
    });
    if(screenId === 'dashboard-screen') loadDashboardData();
    if(screenId === 'leaderboard-screen') loadLeaderboard();
}

function handleSimpleLogin() {
    const user = document.getElementById('auth-username').value.trim();
    if(!user) return showNotification("Naam likhna zaroori hai!", true);
    localStorage.setItem('game_user', user);
    currentUsername = user;
    
    rtdb.ref('users/' + currentUsername).once('value', snap => {
        if(!snap.exists()) {
            rtdb.ref('users/' + currentUsername).set({ username: currentUsername, coins: 0, currentPuzzle: 0, solvedCount: 0 });
        }
        showScreen('dashboard-screen');
    });
}

window.onload = function() {
    if(currentUsername) { showScreen('dashboard-screen'); } 
    else { showScreen('auth-screen'); }
};

function logout() { localStorage.removeItem('game_user'); currentUsername = null; showScreen('auth-screen'); }

function loadDashboardData() {
    rtdb.ref('users/' + currentUsername).on('value', snapshot => {
        const data = snapshot.val();
        if(data) {
            myCoins = data.coins || 0;
            currentPuzzleIndex = data.currentPuzzle || 0;
            solvedCount = data.solvedCount || 0;
            document.getElementById('user-welcome').innerText = `👋 ${data.username}`;
            document.getElementById('dash-coins').innerText = myCoins;
            document.getElementById('dash-level').innerText = `Level ${currentPuzzleIndex + 1}`;
        }
    });
}

function startGame() { showScreen('game-screen'); loadPuzzle(); }

function loadPuzzle() {
    if(currentPuzzleIndex >= puzzles.length) return showNotification("Aapne saare levels poore kar liye! 🎉");
    document.getElementById('hint-ad-container').style.display = 'none';
    const p = puzzles[currentPuzzleIndex];
    document.getElementById('level-indicator').innerText = `Level ${currentPuzzleIndex + 1}`;
    document.getElementById('coin-count').innerText = myCoins;
    document.getElementById('puzzle-question').innerText = p.q;
    updateHeartsDisplay();

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    p.o.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(idx);
        container.appendChild(btn);
    });
}

function checkAnswer(selectedIdx) {
    let p = puzzles[currentPuzzleIndex % puzzles.length];
    if (selectedIdx === p.c) {
        myCoins += 10;
        currentPuzzleIndex++;
        solvedCount++;

        // HAR 10 QUESTION PE POPUNDER WARNING
        if (currentPuzzleIndex > 0 && currentPuzzleIndex % 10 === 0) {
            showNotification("🎉 Next 10 Levels Unlock Karne Ke Liye Ad Dekhein!", false);
        }

        rtdb.ref("users/" + currentUsername).update({ coins: myCoins, currentPuzzle: currentPuzzleIndex, solvedCount: solvedCount });
        showNotification(`Sahi Jawab! +10 Coins 🪙`, false);
        loadPuzzle();
    } else {
        myHearts--;
        if(myHearts <= 0) {
            showNotification("Hearts khatam! 10 Coins deducted", true);
            myCoins = Math.max(0, myCoins - 10); myHearts = 3;
            rtdb.ref("users/" + currentUsername).update({ coins: myCoins });
        } else { showNotification("Galat Jawab! Try Again 💔", true); }
        updateHeartsDisplay();
    }
}

function updateHeartsDisplay() {
    document.getElementById('hearts-container').innerText = "❤️".repeat(myHearts) + "🖤".repeat(3 - myHearts);
}

// ADSTERRA HINT BANNER AD AUTOMATIC INJECTION LOGIC
function triggerHint() {
    let p = puzzles[currentPuzzleIndex % puzzles.length];
    let adContainer = document.getElementById('hint-ad-container');
    let adSlot = document.getElementById('adsterra-banner-slot');
    
    if (adContainer && adSlot) {
        adContainer.style.display = 'block';
        adSlot.innerHTML = '';
        window.atOptions = { 'key' : '67b93ffc4d8321c4397756df5772d4c2', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        let inlineScript = document.createElement('script');
        inlineScript.src = 'https://www.highperformanceformat.com/67b93ffc4d8321c4397756df5772d4c2/invoke.js';
        adSlot.appendChild(inlineScript);
    }
    showNotification(`💡 HINT: ${p.h}`, false);
}

function loadLeaderboard() {
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = 'Loading leaderboard...';
    rtdb.ref('users').orderByChild('coins').limitToLast(10).once('value', snapshot => {
        list.innerHTML = '';
        let players = [];
        snapshot.forEach(child => { players.push(child.val()); });
        players.reverse().forEach((p, i) => {
            const row = document.createElement('div');
            row.className = `player-row ${i===0?'top-player':''} ${p.username===currentUsername?'me':''}`;
            row.innerHTML = `<span>#${i+1} ${p.username}</span><span>🪙 ${p.coins || 0}</span>`;
            list.appendChild(row);
        });
    });
}

function showNotification(msg, isError = false) {
    const pop = document.getElementById('popup-notification');
    pop.innerText = msg;
    pop.style.background = isError ? '#ef4444' : '#22c55e';
    pop.style.display = 'block';
    setTimeout(() => { pop.style.display = 'none'; }, 3000);
}
</script>

<!-- REWARDED POPUNDER AD SCRIPT AT THE END -->
<script src="https://pl30136404.effectivecpmnetwork.com/7b/cf/65/7bcf65131285a606f43e4cfa919c6657.js"></script>

</body>
</html>
